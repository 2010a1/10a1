<!DOCTYPE html>
<html lang="vi" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azota - Ôn tập nhanh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1C3FAA',
                        success: '#91C714',
                        danger: '#D32929',
                        pink: '#EC4899',
                        green: '#10B981',
                        blue: '#3B82F6',
                        red: '#EF4444',
                        purple: '#8B5CF6'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary-color: #1C3FAA;
            --success-color: #91C714;
            --danger-color: #D32929;
            --bg-color: #f8fafc;
            --card-bg: rgba(255,255,255,0.9);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }
        [data-theme="pink"] { --primary-color: #EC4899; --success-color: #10B981; --danger-color: #EF4444; }
        [data-theme="green"] { --primary-color: #10B981; --success-color: #EC4899; --danger-color: #EF4444; }
        [data-theme="blue"] { --primary-color: #3B82F6; --success-color: #10B981; --danger-color: #EF4444; }
        [data-theme="red"] { --primary-color: #EF4444; --success-color: #10B981; --danger-color: #EC4899; }
        [data-theme="purple"] { --primary-color: #8B5CF6; --success-color: #10B981; --danger-color: #EF4444; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            margin: 0;
            overflow-x: hidden;
            position: relative;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(-45deg, var(--primary-color), var(--primary-color)80%, #ffffff20);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(120,219,255,0.3) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.2);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 30px 80px rgba(0,0,0,0.15); }
        .header {
            background: linear-gradient(135deg, var(--primary-color), rgba(28,63,170,0.8));
            color: white;
            padding: 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .mode-card {
            padding: 50px 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(20px);
        }
        .mode-btn {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 30px auto;
            padding: 28px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            background: rgba(255,255,255,0.95);
            border: 2px solid rgba(28,63,170,0.2);
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .mode-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(28,63,170,0.2);
        }
        .question-card {
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .question-num {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .option {
            background: rgba(248,250,252,0.8);
            border: 2px solid rgba(226,232,240,0.8);
            border-radius: 16px;
            padding: 24px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .option:hover {
            background: rgba(238,242,255,0.8);
            border-color: var(--primary-color);
            transform: translateX(8px);
        }
        .option.correct { background: rgba(212,237,218,0.9); border-color: var(--success-color); }
        .option.wrong { background: rgba(252,232,232,0.9); border-color: var(--danger-color); }
        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), rgba(28,63,170,0.8));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 19px;
            font-weight: 600;
            margin-top: 32px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(28,63,170,0.3);
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(28,63,170,0.4);
        }
        .feedback {
            margin-top: 24px;
            padding: 24px;
            border-radius: 16px;
            font-size: 20px;
            text-align: center;
            font-weight: 700;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
        }
        .feedback.show { opacity: 1; transform: translateY(0); }
        .feedback.correct { background: rgba(212,237,218,0.9); color: #155724; border: 1px solid var(--success-color); }
        .feedback.wrong { background: rgba(252,232,232,0.9); color: #721c24; border: 1px solid var(--danger-color); }
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-icon {
            width: 32px;
            height: 32px;
            background: url('https://cdn-icons-png.flaticon.com/512/2040/2040504.png') no-repeat center;
            background-size: contain;
        }
        .setting-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .setting-overlay.show { display: flex; }
        .theme-selector {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 90%;
        }
        .theme-btn {
            display: inline-block;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 10px;
            cursor: pointer;
            border: 4px solid transparent;
            transition: all 0.3s;
        }
        .theme-btn.active {
            border-color: #fff;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .settings-btn { width: 50px; height: 50px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="settings-btn" id="settings-btn">
        <div class="settings-icon"></div>
    </div>
    <div class="setting-overlay" id="setting-overlay">
        <div class="theme-selector">
            <h3 class="text-2xl font-bold mb-8">Chọn màu chủ đề</h3>
            <div class="theme-btn active" style="background: #1C3FAA;" data-theme="default"></div>
            <div class="theme-btn" style="background: #EC4899;" data-theme="pink"></div>
            <div class="theme-btn" style="background: #10B981;" data-theme="green"></div>
            <div class="theme-btn" style="background: #3B82F6;" data-theme="blue"></div>
            <div class="theme-btn" style="background: #EF4444;" data-theme="red"></div>
            <div class="theme-btn" style="background: #8B5CF6;" data-theme="purple"></div>
        </div>
    </div>

    <div class="container pt-8">
        <div class="card header mb-8">
            <h1>Azota - Ôn tập nhanh</h1>
            <small class="text-white/80">© Anh Tú 2026</small>
        </div>

        <div id="mode-selection" class="card mode-card">
            <h2 class="text-3xl font-bold text-[var(--primary-color)] mb-8">Chọn môn và chế độ</h2>

            <!-- Chọn môn -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12">
                <button class="mode-btn subject-btn" data-subject="sinh-hoc">
                    <div class="text-4xl mb-4">🧬</div>
                    Sinh học
                </button>
                <!-- Thêm môn khác khi có file .txt -->
                <button class="mode-btn opacity-50 cursor-not-allowed" disabled>
                    <div class="text-4xl mb-4">📜</div>
                    Lịch sử
                </button>
                <button class="mode-btn opacity-50 cursor-not-allowed" disabled>
                    <div class="text-4xl mb-4">🇬🇧</div>
                    Tiếng Anh
                </button>
                <button class="mode-btn opacity-50 cursor-not-allowed" disabled>
                    <div class="text-4xl mb-4">🧪</div>
                    Hóa học
                </button>
                <button class="mode-btn opacity-50 cursor-not-allowed" disabled>
                    <div class="text-4xl mb-4">⚛️</div>
                    Vật lý
                </button>
            </div>

            <!-- Chọn chế độ -->
            <div class="grid md:grid-cols-2 gap-6">
                <button class="mode-btn" id="mode-practice">
                    <div class="text-4xl mb-4">📚</div>
                    Luyện tập
                    <p class="text-lg mt-4 text-[var(--text-secondary)]">Làm hết mới biết đáp án</p>
                </button>
                <button class="mode-btn" id="mode-challenge">
                    <div class="text-4xl mb-4">⚔️</div>
                    Thử thách
                    <p class="text-lg mt-4 text-[var(--text-secondary)]">Sai 1 câu → kết thúc & load lại sau 1 phút</p>
                </button>
            </div>
        </div>

        <div id="quiz-area" class="hidden mt-8">
            <div class="card question-card">
                <div id="progress" class="text-xl font-medium text-[var(--primary-color)] mb-6 text-center"></div>
                <div id="current-question"></div>
                <button class="submit-btn hidden" id="submit-answer">Nộp đáp án</button>
                <button class="submit-btn hidden" id="next-question">Câu tiếp theo</button>
                <div id="feedback" class="feedback hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // === CONFIG ===
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1452163646766579753/zbvqQ_sMaQmpCxcftbdAGw5LQ-o_ihmSC98HyTqmtmpJCNE7Qmu8sWADU_BsoCwMsyYu';

        const SUBJECTS = {
            "sinh-hoc": {
                name: "Sinh học",
                file: "https://raw.githubusercontent.com/2010a1/10a1/main/questions/sinh-hoc.txt"
            }
            // Thêm môn khác khi có file
        };

        let currentSubject = null;
        let currentMode = null; // 'practice' hoặc 'challenge'
        let questions = [];
        let currentIndex = 0;
        let correctCount = 0;

        // Theme selector
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme || 'default';
                document.documentElement.setAttribute('data-theme', theme);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        document.getElementById('settings-btn').addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('setting-overlay').classList.toggle('show');
        });
        document.getElementById('setting-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('setting-overlay')) {
                document.getElementById('setting-overlay').classList.remove('show');
            }
        });

        // Chọn môn
        document.querySelectorAll('.subject-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSubject = btn.dataset.subject;
                document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('ring-4', 'ring-[var(--primary-color)]'));
                btn.classList.add('ring-4', 'ring-[var(--primary-color)]');
            });
        });

        // Bắt đầu quiz
        document.getElementById('mode-practice').addEventListener('click', () => startQuiz('practice'));
        document.getElementById('mode-challenge').addEventListener('click', () => startQuiz('challenge'));

        async function startQuiz(mode) {
            if (!currentSubject) return alert('Vui lòng chọn môn học trước!');
            currentMode = mode;
            currentIndex = 0;
            correctCount = 0;

            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');

            await loadQuestions();
            shuffle(questions);
            showQuestion();
        }

        async function loadQuestions() {
            try {
                const url = SUBJECTS[currentSubject].file;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                questions = text.trim().split('\n').map(line => {
                    const [q, optsStr, correctStr, explain] = line.split(';').map(s => s.trim());
                    const options = optsStr.split('|');
                    return {
                        question: q,
                        options,
                        correct: parseInt(correctStr) - 1,
                        explain: explain || 'Chưa có giải thích'
                    };
                }).filter(q => q.question);
            } catch (err) {
                alert('Lỗi tải câu hỏi: ' + err.message + '\nKiểm tra URL file .txt trên GitHub');
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showQuestion() {
            if (currentIndex >= questions.length) {
                endQuiz(true); // Hoàn thành
                return;
            }

            const q = questions[currentIndex];
            document.getElementById('progress').textContent = `Câu ${currentIndex + 1} / ${questions.length}`;

            let html = `<div class="question-num">Câu ${currentIndex + 1}</div>`;
            html += `<div class="question-text">${q.question}</div>`;

            html += `<div class="flex flex-col gap-4 mt-6">`;
            q.options.forEach((opt, i) => {
                html += `
                    <label class="option">
                        <input type="radio" name="q${currentIndex}" value="${i}">
                        ${String.fromCharCode(65 + i)}. ${opt}
                    </label>`;
            });
            html += `</div>`;

            document.getElementById('current-question').innerHTML = html;
            document.getElementById('submit-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');
        }

        document.getElementById('submit-answer').addEventListener('click', () => {
            const selected = document.querySelector(`input[name="q${currentIndex}"]:checked`);
            if (!selected) return alert('Chọn đáp án trước nhé!');

            const choice = parseInt(selected.value);
            const q = questions[currentIndex];
            const isCorrect = choice === q.correct;

            // Hiển thị đúng/sai
            document.querySelectorAll(`input[name="q${currentIndex}"]`).forEach(inp => {
                const label = inp.parentElement;
                const i = parseInt(inp.value);
                if (i === q.correct) label.classList.add('correct');
                if (i === choice && !isCorrect) label.classList.add('wrong');
                inp.disabled = true;
            });

            const feedback = document.getElementById('feedback');
            feedback.innerHTML = isCorrect
                ? `<strong class="text-3xl">ĐÚNG RỒI! 🎉</strong><br><div class="mt-4 text-lg">${q.explain}</div>`
                : `<strong class="text-3xl">SAI RỒI 😞</strong><br>Đáp án đúng: ${String.fromCharCode(65 + q.correct)}<br><div class="mt-4 text-lg">${q.explain}</div>`;

            feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'} show`;
            document.getElementById('submit-answer').classList.add('hidden');

            if (isCorrect) {
                correctCount++;
                document.getElementById('next-question').classList.remove('hidden');
            } else {
                // Chế độ thử thách: sai → chờ 60 giây → reload
                let timeLeft = 60;
                feedback.innerHTML += `<br><br>Làm lại sau <span id="countdown" class="text-3xl font-bold text-[var(--danger-color)]">${timeLeft}</span> giây`;
                const timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('countdown').textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        location.reload();
                    }
                }, 1000);
            }
        });

        document.getElementById('next-question').addEventListener('click', () => {
            currentIndex++;
            showQuestion();
        });

        function endQuiz(completed) {
            document.getElementById('current-question').innerHTML = `
                <div class="text-center py-12">
                    <div class="text-5xl font-bold ${completed ? 'text-[var(--success-color)]' : 'text-[var(--danger-color)]'}">
                        ${completed ? 'HOÀN THÀNH!' : 'KẾT THÚC'}
                    </div>
                    <div class="text-3xl mt-6">
                        Đúng: ${correctCount} / ${questions.length}
                    </div>
                    <button class="submit-btn mt-10" onclick="location.reload()">Chơi lại</button>
                </div>
            `;
            document.getElementById('submit-answer').classList.add('hidden');
            document.getElementById('next-question').classList.add('hidden');
        }
    </script>
</body>
</html>
