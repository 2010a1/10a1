<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 EduStats - Dashboard Appwrite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- CDN sửa lại giống code ôn tập của bạn - expose Appwrite chữ hoa -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
        }

        .no-data {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #71717a;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center text-4xl shadow-xl">📊</div>
                <div>
                    <h1 class="title-font text-4xl font-bold tracking-tight text-white">EduStats</h1>
                    <p class="text-zinc-400">Thống kê bài tập • Appwrite</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 flex-wrap">
                <div class="bg-zinc-900 rounded-full p-1.5 shadow-inner flex">
                    <button onclick="setFilter('today')" id="btn-today" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all">Hôm nay</button>
                    <button onclick="setFilter('yesterday')" id="btn-yesterday" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all">Hôm qua</button>
                    <button onclick="setFilter('7days')" id="btn-7days" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all">7 ngày</button>
                </div>

                <button onclick="showSettingsModal()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-full text-sm font-medium transition-colors">
                    <span class="text-yellow-400">⚙️</span> Cấu hình
                </button>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading-overlay" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="w-14 h-14 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-lg">Đang tải dữ liệu...</p>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="main-content">

            <!-- OVERVIEW CARDS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="card bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                    <p class="text-zinc-400 text-sm font-medium mb-2">TỔNG LẦN LÀM BÀI</p>
                    <p id="total-attempts" class="text-5xl font-bold text-white">0</p>
                    <div id="comparison" class="mt-4 text-sm"></div>
                </div>

                <div class="card bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                    <p class="text-zinc-400 text-sm font-medium mb-2">TỔNG TOÀN BỘ</p>
                    <p id="total-all" class="text-5xl font-bold text-white">0</p>
                </div>

                <div class="card bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                    <p class="text-zinc-400 text-sm font-medium mb-2">TRUNG BÌNH ĐIỂM</p>
                    <p id="avg-score-all" class="text-5xl font-bold text-white">0.0</p>
                </div>
            </div>

            <!-- SUBJECTS -->
            <div class="mb-12">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-semibold flex items-center gap-3">
                        <span class="text-3xl">📘</span> Theo môn học
                    </h2>
                </div>
                <div id="subject-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-5">
                    <!-- JS sẽ điền -->
                </div>
            </div>

            <!-- CHARTS -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                <div class="bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                    <h3 id="time-chart-title" class="font-semibold mb-6 text-lg">Số lần làm bài theo giờ</h3>
                    <div class="chart-container">
                        <canvas id="timeChart"></canvas>
                        <div id="time-no-data" class="no-data hidden">Chưa có dữ liệu trong khoảng thời gian này</div>
                    </div>
                </div>

                <div class="bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                    <h3 class="font-semibold mb-6 text-lg">Tổng bài theo môn</h3>
                    <div class="chart-container">
                        <canvas id="subjectChart"></canvas>
                        <div id="subject-no-data" class="no-data hidden">Chưa có dữ liệu</div>
                    </div>
                </div>
            </div>

            <!-- AVG SCORE -->
            <div class="bg-zinc-900/80 backdrop-blur-sm rounded-3xl p-8 border border-zinc-800 shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <span class="text-3xl">⭐</span> Trung bình điểm theo môn
                </h2>
                <div id="avg-list" class="space-y-4">
                    <!-- JS sẽ điền -->
                </div>
            </div>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center" onclick="if(event.target.id==='settings-modal') hideSettingsModal()">
            <div class="bg-zinc-900 w-full max-w-lg mx-4 rounded-3xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
                <div class="p-8">
                    <h2 class="text-2xl font-bold mb-8">Cấu hình Appwrite</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-2">Endpoint</label>
                            <input id="input-endpoint" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-yellow-500 outline-none" value="https://sgp.cloud.appwrite.io/v1">
                        </div>
                        <div>
                            <label class="block text-sm text-zinc-400 mb-2">Project ID</label>
                            <input id="input-project" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-yellow-500 outline-none" value="69ba3b66000aa8f0d52a">
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">Database ID</label>
                                <input id="input-db" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-yellow-500 outline-none" value="69ba3bc80028695398b8">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">Collection ID</label>
                                <input id="input-collection" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-yellow-500 outline-none" value="leaderboard">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="border-t border-zinc-800 p-6 flex gap-4">
                    <button onclick="hideSettingsModal()" class="flex-1 py-3 text-zinc-300 hover:text-white">Hủy</button>
                    <button onclick="saveAndConnect()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-semibold py-3 rounded-xl transition-colors">Lưu & Kết nối</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GLOBALS ====================
        let client = null;
        let databases = null;
        let allDocs = [];
        let currentFilter = 'today';
        let timeChart = null;
        let subjectChart = null;

        const config = {
            endpoint: 'https://sgp.cloud.appwrite.io/v1',
            projectId: '69ba3b66000aa8f0d52a',
            databaseId: '69ba3bc80028695398b8',
            collectionId: 'leaderboard'
        };

        // ==================== DATE UTILS ====================
        function getStartOfDay(date = new Date()) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        function getDateRange(filter) {
            const todayStart = getStartOfDay();
            if (filter === 'today') {
                return { start: todayStart, end: new Date(todayStart.getTime() + 86400000) };
            }
            if (filter === 'yesterday') {
                const y = new Date(todayStart.getTime() - 86400000);
                return { start: y, end: todayStart };
            }
            const sevenDaysAgo = new Date(todayStart.getTime() - 6 * 86400000);
            return { start: sevenDaysAgo, end: new Date(todayStart.getTime() + 86400000) };
        }

        function getPrevRange(start, end) {
            const duration = end - start;
            return { start: new Date(start - duration), end: start };
        }

        function filterDocs(docs, start, end) {
            return docs.filter(d => {
                const t = new Date(d.$createdAt);
                return t >= start && t < end;
            });
        }

        // ==================== DATA HELPERS ====================
        function calculateStats(docs) {
            if (!docs?.length) return { total: 0, avg: '0.0' };
            const sum = docs.reduce((s, d) => s + Number(d.score || 0), 0);
            return { total: docs.length, avg: (sum / docs.length).toFixed(1) };
        }

        function getSubjectCounts(docs) {
            return docs.reduce((acc, d) => {
                const s = d.subject || 'Khác';
                acc[s] = (acc[s] || 0) + 1;
                return acc;
            }, {});
        }

        function getAvgBySubject(docs) {
            const map = docs.reduce((acc, d) => {
                const s = d.subject || 'Khác';
                if (!acc[s]) acc[s] = { sum: 0, cnt: 0 };
                acc[s].sum += Number(d.score || 0);
                acc[s].cnt++;
                return acc;
            }, {});
            return Object.fromEntries(
                Object.entries(map).map(([k, v]) => [k, (v.sum / v.cnt).toFixed(1)])
            );
        }

        function getHourlyData(docs) {
            const arr = new Array(24).fill(0);
            docs.forEach(d => {
                const h = new Date(d.$createdAt).getHours();
                arr[h]++;
            });
            return arr;
        }

        // ==================== RENDER ====================
        function renderSubjectCards(current, prev) {
            const container = document.getElementById('subject-cards');
            container.innerHTML = '';
            const currMap = getSubjectCounts(current);
            const prevMap = getSubjectCounts(prev);
            const subs = [...new Set([...Object.keys(currMap), ...Object.keys(prevMap)])].slice(0, 10);

            subs.forEach(sub => {
                const c = currMap[sub] || 0;
                const p = prevMap[sub] || 0;
                const diff = c - p;
                const diffEl = diff !== 0 ? `<span class="${diff > 0 ? 'text-emerald-400' : 'text-red-400'} text-xs ml-1">${diff > 0 ? '+' : ''}${diff}</span>` : '';

                container.innerHTML += `
                    <div class="card bg-zinc-900/70 rounded-2xl p-5 border border-zinc-800 cursor-pointer hover:bg-zinc-800/70 transition-all" onclick="alert('Chi tiết môn ${sub}')">
                        <p class="font-medium">${sub}</p>
                        <p class="text-3xl font-bold mt-2">${c}</p>
                        ${diffEl}
                    </div>
                `;
            });
        }

        function renderAvgList(docs) {
            const container = document.getElementById('avg-list');
            container.innerHTML = '';
            const avgs = getAvgBySubject(docs);
            Object.keys(avgs).sort().forEach(sub => {
                const score = avgs[sub];
                const count = docs.filter(d => d.subject === sub).length;
                container.innerHTML += `
                    <div class="bg-zinc-900/50 rounded-2xl p-5 border border-zinc-800">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">📘</span>
                                <span class="font-medium text-lg">${sub}</span>
                            </div>
                            <span class="text-3xl font-bold">${score}</span>
                        </div>
                        <p class="text-sm text-zinc-400 mt-2">Dựa trên ${count} bài</p>
                    </div>
                `;
            });
        }

        function updateOverview(currDocs, prevDocs) {
            const c = calculateStats(currDocs);
            const p = calculateStats(prevDocs);
            document.getElementById('total-attempts').textContent = c.total;
            document.getElementById('total-all').textContent = allDocs.length;
            document.getElementById('avg-score-all').textContent = c.avg;

            const diff = c.total - p.total;
            document.getElementById('comparison').innerHTML = diff !== 0 ? `
                <span class="inline-block px-3 py-1 rounded-full text-xs ${diff >= 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
                    ${diff >= 0 ? '↑' : '↓'} ${Math.abs(diff)} so với kỳ trước
                </span>
            ` : '';
        }

        function createTimeChart(docs, isSingleDay) {
            const ctx = document.getElementById('timeChart');
            const noData = document.getElementById('time-no-data');

            if (timeChart) timeChart.destroy();

            if (!docs.length) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            let labels, data, title;
            if (isSingleDay) {
                data = getHourlyData(docs);
                labels = Array.from({length: 24}, (_,i) => `${i}h`);
                title = 'Số lần làm bài theo giờ hôm nay';
            } else {
                data = getHourlyData(docs);
                labels = Array.from({length: 24}, (_,i) => `${i}h`);
                title = 'Số lần làm bài (7 ngày)';
            }

            document.getElementById('time-chart-title').textContent = title;

            timeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: '#eab308',
                        borderRadius: 6,
                        barThickness: isSingleDay ? 20 : 28
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#27272a' }, ticks: { color: '#a1a1aa' } },
                        x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                    }
                }
            });
        }

        function createSubjectChart(docs) {
            const ctx = document.getElementById('subjectChart');
            const noData = document.getElementById('subject-no-data');

            if (subjectChart) subjectChart.destroy();

            if (!docs.length) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            const counts = getSubjectCounts(docs);
            const labels = Object.keys(counts);
            const data = Object.values(counts);

            subjectChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: '#eab308',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#27272a' }, ticks: { color: '#a1a1aa' } },
                        x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                    }
                }
            });
        }

        function updateAllUI() {
            if (!allDocs.length) return;

            const range = getDateRange(currentFilter);
            const current = filterDocs(allDocs, range.start, range.end);
            const prevRange = getPrevRange(range.start, range.end);
            const prev = filterDocs(allDocs, prevRange.start, prevRange.end);

            updateOverview(current, prev);
            renderSubjectCards(current, prev);
            renderAvgList(current);

            const isSingle = (range.end - range.start) === 86400000;
            createTimeChart(current, isSingle);
            createSubjectChart(current);
        }

        // ==================== APPWRITE ====================
        async function connectAppwrite() {
            try {
                document.getElementById('loading-overlay').classList.remove('hidden');

                client = new Appwrite.Client()
                    .setEndpoint(config.endpoint)
                    .setProject(config.projectId);

                databases = new Appwrite.Databases(client);

                const res = await databases.listDocuments(
                    config.databaseId,
                    config.collectionId,
                    [Appwrite.Query.limit(10000)]
                );

                allDocs = res.documents;
                document.getElementById('loading-overlay').classList.add('hidden');
                updateAllUI();
            } catch (err) {
                console.error("Lỗi Appwrite:", err);
                document.getElementById('loading-overlay').classList.add('hidden');
                alert('Kết nối thất bại: ' + (err.message || 'Không xác định'));
            }
        }

        function saveAndConnect() {
            config.endpoint   = document.getElementById('input-endpoint').value.trim();
            config.projectId  = document.getElementById('input-project').value.trim();
            config.databaseId = document.getElementById('input-db').value.trim();
            config.collectionId = document.getElementById('input-collection').value.trim();

            localStorage.setItem('appwriteEduStats', JSON.stringify(config));
            hideSettingsModal();
            connectAppwrite();
        }

        // ==================== FILTER & MODAL ====================
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('bg-yellow-500', b.id === `btn-${f}`);
                b.classList.toggle('text-zinc-950', b.id === `btn-${f}`);
            });
            if (allDocs.length) updateAllUI();
        }

        function showSettingsModal() {
            const saved = localStorage.getItem('appwriteEduStats');
            if (saved) {
                const s = JSON.parse(saved);
                Object.assign(config, s);
                document.getElementById('input-endpoint').value = config.endpoint;
                document.getElementById('input-project').value = config.projectId;
                document.getElementById('input-db').value = config.databaseId;
                document.getElementById('input-collection').value = config.collectionId;
            }
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function hideSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        // ==================== INIT ====================
        window.addEventListener('resize', () => {
            if (timeChart) timeChart.resize();
            if (subjectChart) subjectChart.resize();
        });

        window.onload = () => {
            const saved = localStorage.getItem('appwriteEduStats');
            if (saved) Object.assign(config, JSON.parse(saved));
            setFilter('today');
            connectAppwrite();
        };
    </script>
</body>
</html>
